#####################################################################
# Thermistors
#####################################################################

## Chamber thermistor — used for chamber temp monitoring in ZERO_TOUCH_PREP.
# Renamed from 'frame' to 'chamber' to match the sensor name expected by
# ZERO_TOUCH_PREP in common_macros.cfg. Also update any Mainsail/Fluidd
# dashboard references if you have them pinned.
[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: z:P0.24
min_temp: 10
max_temp: 150

## EBBCan MCU die temperature — read directly over CAN, not a thermistor wire.
# min_temp: 0 is correct here — MCU sensors don't fail like thermistor wires
# and the board can genuinely be cold at startup.
[temperature_sensor EBBCan]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

## Raspberry Pi host temperature
[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
