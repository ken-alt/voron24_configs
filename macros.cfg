# VORON 2.4 350mm — SKR 1.4 / EBBCan


#####################################################################
#
#  macros.cfg — Voron 2.4 350mm
#  Machine-specific macros only.
#  All shared logic lives in common_macros.cfg (included first).
#
#  Defines:
#    _LEVEL_BED           → SMART_QGL (QUAD_GANTRY_LEVEL, 4-point)
#    _ON_PAUSE            → led_effect yellow_pause + SB LED
#    _ON_RESUME           → lights on + SB LED printing state
#    _RESET_SESSION_FLAGS → clears SMART_QGL + SMART_MESH variables
#    NEVERMORE_AUTO       → single fan_generic (nevermore)
#    NEVERMORE_OFF        → single fan off
#    BED_FANS_AUTO        → rear 5015 bed fans (Feday mount), ABS only (>=100C)
#    BED_FANS_OFF         → bed fans off
#    SMART_QGL            → session-reuse QUAD_GANTRY_LEVEL
#    AUTO_MODE            → accel tuned per print footprint
#
#####################################################################


#####################################################################
# Bed Leveling — QGL (2.4: 4-point gantry)
#####################################################################

[gcode_macro _LEVEL_BED]
description: 2.4 bed leveling — calls SMART_QGL
gcode:
    SMART_QGL


[gcode_macro SMART_QGL]
description: QUAD_GANTRY_LEVEL with session-based skip
variable_last_qgl_valid: 0
gcode:
    {% if last_qgl_valid == 1 and "z" in printer.toolhead.homed_axes %}
        M117 Skipping QGL (done this session)
        RESPOND MSG="SMART_QGL: reusing session result"
    {% else %}
        M117 Running QGL
        status_leveling
        QUAD_GANTRY_LEVEL
        G28 Z
        SET_GCODE_VARIABLE MACRO=SMART_QGL VARIABLE=last_qgl_valid VALUE=1
        RESPOND MSG="SMART_QGL: QGL complete"
    {% endif %}

[delayed_gcode RESET_QGL]
initial_duration: 2
gcode:
    SET_GCODE_VARIABLE MACRO=SMART_QGL VARIABLE=last_qgl_valid VALUE=0


#####################################################################
# Session Flag Reset — called by PRINT_END in common_macros.cfg
#####################################################################

[gcode_macro _RESET_SESSION_FLAGS]
description: Reset leveling and mesh session flags after print
gcode:
    SET_GCODE_VARIABLE MACRO=SMART_QGL   VARIABLE=last_qgl_valid  VALUE=0
    SET_GCODE_VARIABLE MACRO=SMART_MESH  VARIABLE=last_mesh_valid VALUE=0


#####################################################################
# Nevermore — single fan_generic
#####################################################################

[gcode_macro NEVERMORE_AUTO]
description: Set Nevermore speed based on bed target temp
gcode:
    {% if printer.heater_bed.target > 80 %}
        SET_FAN_SPEED FAN=nevermore SPEED=1.0
    {% else %}
        SET_FAN_SPEED FAN=nevermore SPEED=0.3
    {% endif %}

[gcode_macro NEVERMORE_OFF]
description: Turn off Nevermore fan
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0


#####################################################################
# Bed Fans — rear 5015 blowers (Feday mount)
# HoneyBadger 5015B-24-6400 x2 in parallel on main SKR FAN header (P2.3)
# ABS/ASA only — threshold 100C. No fans for PETG/PLA.
# Speed tuned at 0.3 post-PID. Monitor bed temp graph on first ABS print.
# Increase to 0.4–0.5 only if chamber temps are insufficient.
#####################################################################

[gcode_macro BED_FANS_AUTO]
description: Set bed fan speed based on bed target temp — ABS/ASA only
gcode:
    {% if printer.heater_bed.target >= 100 %}
        SET_FAN_SPEED FAN=bed_fans SPEED=0.3
    {% else %}
        SET_FAN_SPEED FAN=bed_fans SPEED=0.0
    {% endif %}

[gcode_macro BED_FANS_OFF]
description: Turn off bed fans
gcode:
    SET_FAN_SPEED FAN=bed_fans SPEED=0.0


#####################################################################
# Pause / Resume light hooks — 2.4 uses led_effect + SB LEDs
#####################################################################

[gcode_macro _ON_PAUSE]
description: 2.4 pause state — yellow breathing effect + SB LED
gcode:
    SET_LED_EFFECT EFFECT=yellow_pause
    _set_sb_leds_by_name leds="logo" color="busy" transmit=0
    set_nozzle_leds_on

[gcode_macro _ON_RESUME]
description: 2.4 resume state — lights on + SB LED printing
gcode:
    LIGHTS_ON
    status_printing


#####################################################################
# Auto Mode — accel based on print footprint (2.4 only)
#####################################################################

[gcode_macro AUTO_MODE]
description: Set accel based on overall print footprint (all objects, correct polygon structure)
gcode:
    {% if printer.exclude_object.objects|length > 0 %}
        # polygon is a list of [x,y] vertex tuples — iterate to find bounding box
        {% set ns = namespace(min_x=9999, min_y=9999, max_x=0, max_y=0) %}
        {% for obj in printer.exclude_object.objects %}
            {% for pt in obj.polygon %}
                {% if pt[0] < ns.min_x %}{% set ns.min_x = pt[0] %}{% endif %}
                {% if pt[1] < ns.min_y %}{% set ns.min_y = pt[1] %}{% endif %}
                {% if pt[0] > ns.max_x %}{% set ns.max_x = pt[0] %}{% endif %}
                {% if pt[1] > ns.max_y %}{% set ns.max_y = pt[1] %}{% endif %}
            {% endfor %}
        {% endfor %}
        {% set size = [(ns.max_x - ns.min_x), (ns.max_y - ns.min_y)]|max %}
        {% if size < 100 %}
            SET_VELOCITY_LIMIT ACCEL=3500
        {% elif size < 200 %}
            SET_VELOCITY_LIMIT ACCEL=3000
        {% else %}
            SET_VELOCITY_LIMIT ACCEL=2500
        {% endif %}
        RESPOND MSG="AUTO_MODE: footprint {size|round(0)}mm accel set"
    {% else %}
        SET_VELOCITY_LIMIT ACCEL=3500
    {% endif %}


#####################################################################
# Utility
# DEBUG_TEMP lives in common_macros.cfg — shared across both printers
#####################################################################

[gcode_macro WATCH_PRINT]
description: Manual temp sanity check — call from console only
gcode:
    {% if printer.extruder.temperature < printer.extruder.target - 20 %}
        RESPOND TYPE=error MSG="Temp drop: {printer.extruder.temperature}C vs target {printer.extruder.target}C"
        PAUSE
        M117 Temp drop detected
    {% endif %}

[gcode_macro SAFE_QGL]
description: Run QGL twice for extra confidence
gcode:
    QUAD_GANTRY_LEVEL
    QUAD_GANTRY_LEVEL