[neopixel mains]
pin: P1.24
chain_count: 31
color_order: GRB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0


#####################################################################
# Manual Color Macros
#####################################################################

[gcode_macro red]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=1.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1

[gcode_macro green]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=1.0 BLUE=0.0 TRANSMIT=1

[gcode_macro blue]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=0.75 BLUE=1.0 TRANSMIT=1

[gcode_macro white]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.80 GREEN=0.80 BLUE=0.80 TRANSMIT=1

[gcode_macro yellow]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=1.0 GREEN=1.0 BLUE=0.0 TRANSMIT=1

[gcode_macro LIGHTS_ON]
gcode:
    STOP_LED_EFFECTS
    white

[gcode_macro LIGHTS_OFF]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1


#####################################################################
# Effects
#####################################################################

[led_effect red_warmup]
leds:
    neopixel:mains
layers:
    breathing      8  0   difference (1.0, 0.0, 0.0)
autostart:                             false
frame_rate:                            24

[led_effect first_on]
leds:
    neopixel:mains
layers:
    comet          2  1.5   top       (0.8, 1.0, 1.0),(0.0, 0.8, 1.0),(0.0, 0.0, 1.0)
autostart:                             false
frame_rate:                            24

[led_effect critical_error]
leds:
    neopixel:mains
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true

[led_effect yellow_pause]
leds:
    neopixel:mains
layers:
    breathing      5  0   difference (1.0, 1.0, 0.0)
autostart:                             false
frame_rate:                            24

[led_effect cooling_effect]
leds:
    neopixel:mains
layers:
    breathing      6  0   difference (0.0, 0.2, 0.8)
autostart:                             false
frame_rate:                            24

[led_effect heating_effect]
leds:
    neopixel:mains
layers:
    breathing      4  0   difference (0.8, 0.3, 0.0)
autostart:                             false
frame_rate:                            24


#####################################################################
# Unified Status Macros
# No rename_existing — directly redefine status macros here and call
# SB helpers directly. steathburner_leds.cfg must NOT define these
# same macro names, so remove the status macro section from
# steathburner_leds.cfg on the 2.4 (keep only the neopixel definition
# and the _set_sb_leds / _sb_vars helper macros).
#####################################################################

[gcode_macro status_ready]
gcode:
    _set_sb_leds_by_name leds="logo" color="standby" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="standby" transmit=1
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.20 GREEN=0.20 BLUE=0.20 TRANSMIT=1

[gcode_macro status_heating]
gcode:
    _set_sb_leds_by_name leds="logo" color="heating" transmit=0
    _set_sb_leds_by_name leds="nozzle" color="heating" transmit=1
    SET_LED_EFFECT EFFECT=heating_effect

[gcode_macro status_printing]
gcode:
    _set_sb_leds_by_name leds="logo" color="printing" transmit=0
    set_nozzle_leds_on
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=0.5 BLUE=0.05 TRANSMIT=1

[gcode_macro status_cooling]
gcode:
    _set_sb_leds_by_name leds="logo" color="cooling" transmit=0
    set_nozzle_leds_off
    SET_LED_EFFECT EFFECT=cooling_effect

[gcode_macro status_error]
gcode:
    _set_sb_leds_by_name leds="logo" color="error" transmit=0
    set_nozzle_leds_off
    SET_LED_EFFECT EFFECT=critical_error

[gcode_macro status_homing]
gcode:
    _set_sb_leds_by_name leds="logo" color="homing" transmit=0
    set_nozzle_leds_on
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=0.4 BLUE=0.15 TRANSMIT=1

[gcode_macro status_leveling]
gcode:
    _set_sb_leds_by_name leds="logo" color="leveling" transmit=0
    set_nozzle_leds_on
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.35 GREEN=0.05 BLUE=0.3 TRANSMIT=1

[gcode_macro status_meshing]
gcode:
    _set_sb_leds_by_name leds="logo" color="meshing" transmit=0
    set_nozzle_leds_on
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.1 GREEN=0.7 BLUE=0.0 TRANSMIT=1

[gcode_macro status_off]
gcode:
    set_logo_leds_off transmit=0
    set_nozzle_leds_off
    STOP_LED_EFFECTS
    SET_LED LED=mains RED=0.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1

[gcode_macro status_busy]
gcode:
    _set_sb_leds_by_name leds="logo" color="busy" transmit=0
    set_nozzle_leds_on

[gcode_macro status_paused]
gcode:
    _set_sb_leds_by_name leds="logo" color="busy" transmit=0
    set_nozzle_leds_on
    SET_LED_EFFECT EFFECT=yellow_pause

[gcode_macro status_calibrating_z]
gcode:
    _set_sb_leds_by_name leds="logo" color="calibrating_z" transmit=0
    set_nozzle_leds_on

[gcode_macro status_cleaning]
gcode:
    _set_sb_leds_by_name leds="logo" color="cleaning" transmit=0
    set_nozzle_leds_on


#####################################################################
# Startup
#####################################################################

[delayed_gcode startup]
initial_duration: 1
gcode:
    status_ready
    M117 Hello!
