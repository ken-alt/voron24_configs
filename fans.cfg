# VORON 2.4 350mm — SKR 1.4 / EBBCan


#####################################################################
# Fan Control
#####################################################################
 
[fan]
pin: EBBCan: PA1
kick_start_time: 0.5
off_below: 0.10
# Improves PWM stability on CAN toolheads — reduces jitter and
# inconsistent airflow at low speeds on EBB36
cycle_time: 0.010
 
[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50
 
[heater_fan controller_fan]
pin: z:P2.4
kick_start_time: 0.5
heater: heater_bed
heater_temp: 45.0
 
# fan_generic is correct type for manual SET_FAN_SPEED control from macros.
# Auto-control handled by NEVERMORE_AUTO in macro.cfg, turned off in PRINT_END.
[fan_generic nevermore]
pin: z:P2.7
max_power: 1.0
shutdown_speed: 0.0
off_below: 0.1
# Reduced from 5.0 to 1.0 — increase back if fan struggles to start
kick_start_time: 1.0
 