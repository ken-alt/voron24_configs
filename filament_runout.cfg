# VORON 2.4 350mm — SKR 1.4 / EBBCan


[filament_motion_sensor BTT_Filament_Sensor]
detection_length: 25.0
extruder: extruder
switch_pin: ^P1.27
pause_on_runout: False
runout_gcode:
    M117 Runout Detected
    {% if printer.extruder.temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
        G91
        G1 E-5 F300
        G90
    {% endif %}
    PAUSE
insert_gcode:
    M117 Insert Detected
event_delay: 5.0
pause_delay: 0.5