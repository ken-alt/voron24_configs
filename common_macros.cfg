#####################################################################
#
#  common_macros.cfg
#  Shared across all printers. Include this from each printer's
#  printer.cfg BEFORE the printer-specific macros.cfg.
#
#  [include common_macros.cfg]
#  [include macros.cfg]          ← printer-specific overrides only
#
#  What lives here:
#    - Conditional homing helpers
#    - Preflight / health monitoring
#    - ZERO_TOUCH_PREP (calls _LEVEL_BED which each printer defines)
#    - SMART_MESH
#    - PRINT_START / PRINT_END
#    - Filament macros
#    - Parking macros
#    - PRIME_LINE / G32 / RESET_EXTRUDER
#    - DEBUG_TEMP
#    - Spoolman (requires Spoolman in moonraker.conf on each printer)
#
#  What does NOT live here (defined in each printer's macros.cfg):
#    - _LEVEL_BED          (QGL vs Z_TILT — kinematics-specific)
#    - NEVERMORE_AUTO/OFF  (fan count and pin names differ)
#    - BED_FANS_AUTO/OFF   (V2.4 only — called conditionally via `is defined` check)
#    - SMART_ZTILT         (Trident only)
#    - SMART_QGL           (2.4 only)
#    - Z_TILT_ADJUST       (Trident wrapper — 2.4 has no equivalent)
#    - WLED macros          (Trident only — 2.4 uses led_effect)
#
#####################################################################


#####################################################################
# Conditional Homing
#####################################################################

[gcode_macro CG28]
description: Home if not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

[gcode_macro XYCG28]
description: Home XY if not already homed
gcode:
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}

[gcode_macro ZCG28]
description: Home Z if not already homed
gcode:
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}


#####################################################################
# Preflight / Health Monitoring
#####################################################################

[gcode_macro PREFLIGHT_CHECK]
description: Sanity check sensors before heating begins
gcode:
    {% if printer.extruder.temperature < 5 %}
        status_error
        { action_raise_error("Preflight failed: extruder temp invalid — check thermistor") }
    {% endif %}
    {% if printer.heater_bed.temperature < 5 %}
        status_error
        { action_raise_error("Preflight failed: bed temp invalid — check thermistor") }
    {% endif %}
    {% if printer["temperature_sensor EBBCan"] is not defined %}
        status_error
        { action_raise_error("Preflight failed: EBBCan sensor missing — check CAN connection") }
    {% elif printer["temperature_sensor EBBCan"].temperature < 5 %}
        status_error
        { action_raise_error("Preflight failed: EBBCan temp invalid — check CAN board") }
    {% endif %}
    RESPOND MSG="Preflight OK — all sensors present"

[gcode_macro HEALTH_CHECK]
description: Check extruder and EBBCan temps — warns during print, hard error when idle
gcode:
    {% set e_temp   = printer.extruder.temperature %}
    {% set e_target = printer.extruder.target %}
    {% set printing = printer.idle_timeout.state == "Printing" %}
    {% if printer["temperature_sensor EBBCan"] is defined %}
        {% set ebb_temp = printer['temperature_sensor EBBCan'].temperature %}
    {% else %}
        {% set ebb_temp = 0 %}
        {% if printing %}
            RESPOND TYPE=error MSG="WARNING: EBBCan temp sensor unavailable — CAN issue?"
        {% endif %}
    {% endif %}
    {% if e_temp < 5 and e_target > 0 %}
        {% if printing %}
            RESPOND TYPE=error MSG="WARNING: Extruder reads {e_temp}C — possible sensor fault"
        {% else %}
            status_error
            { action_raise_error("Extruder temp invalid — possible sensor fault") }
        {% endif %}
    {% endif %}
    {% if e_target > 0 and e_temp > 30 and (e_target - e_temp) > 100 and printing %}
        RESPOND TYPE=error MSG="WARNING: Extruder heating slowly — {e_temp}C of {e_target}C"
    {% endif %}
    {% if ebb_temp > 75 %}
        {% if printing %}
            RESPOND TYPE=error MSG="WARNING: EBB CAN board at {ebb_temp}C — check airflow"
        {% else %}
            status_error
            { action_raise_error("EBB CAN temp too high: " ~ ebb_temp ~ "C") }
        {% endif %}
    {% endif %}

[delayed_gcode HEALTH_LOOP]
initial_duration: 0
gcode:
    {% if printer.idle_timeout.state == "Printing" %}
        HEALTH_CHECK
        UPDATE_DELAYED_GCODE ID=HEALTH_LOOP DURATION=30
    {% endif %}


#####################################################################
# Smart Mesh — session reuse
#####################################################################

[gcode_macro SMART_MESH]
description: Adaptive bed mesh with session reuse — skips if same bed temp
variable_last_bed_temp: 0
variable_last_mesh_valid: 0
gcode:
    {% set current_bed = printer.heater_bed.target|int %}
    {% set reuse = 0 %}
    {% if last_mesh_valid == 1 and (current_bed - last_bed_temp)|abs < 5 %}
        {% set reuse = 1 %}
    {% endif %}
    {% if reuse == 1 %}
        M117 Reusing bed mesh
        RESPOND MSG="SMART_MESH: reusing mesh from this session"
    {% else %}
        M117 Running bed mesh
        status_meshing
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE ADAPTIVE=1
        SET_GCODE_VARIABLE MACRO=SMART_MESH VARIABLE=last_bed_temp VALUE={current_bed}
        SET_GCODE_VARIABLE MACRO=SMART_MESH VARIABLE=last_mesh_valid VALUE=1
    {% endif %}


#####################################################################
# Zero-Touch Prep
# Calls _LEVEL_BED — defined per-printer (QGL or Z_TILT)
#####################################################################

[gcode_macro ZERO_TOUCH_PREP]
description: Bed wait + soak + level + mesh. BED and CHAMBER passed from PRINT_START.
gcode:
    {% set bed_target     = params.BED|default(printer.heater_bed.target)|int %}
    {% set chamber_target = params.CHAMBER|default(0)|int %}

    G90
    status_heating
    M117 Zero-touch prep
    HEALTH_CHECK

    # Bed heat — only wait if more than 5C away
    {% set current_bed = printer.heater_bed.temperature|int %}
    {% if (bed_target - current_bed) > 5 %}
        M117 Heating bed...
        M190 S{bed_target}
    {% else %}
        M117 Bed already at temp
    {% endif %}

    # Temperature soak — only if bed had to heat up significantly
    {% if (bed_target - current_bed) > 5 %}
        {% if bed_target >= 110 %}
            M117 Soaking 5 min (high temp)...
            G4 P300000
        {% elif bed_target >= 90 %}
            M117 Soaking 3 min (mid temp)...
            G4 P180000
        {% elif bed_target >= 60 %}
            M117 Soaking 2 min...
            G4 P120000
        {% else %}
            M117 Soaking 1 min (PLA)...
            G4 P60000
        {% endif %}
    {% else %}
        M117 Bed already at temp — skipping soak
    {% endif %}

    # Chamber wait — run before leveling for thermal stability
    # Detects sensor name automatically: Trident uses 'frame', 2.4 uses 'chamber'
    {% if chamber_target > 0 %}
        {% if printer["temperature_sensor frame"] is defined %}
            {% set chamber_sensor = "temperature_sensor frame" %}
        {% elif printer["temperature_sensor chamber"] is defined %}
            {% set chamber_sensor = "temperature_sensor chamber" %}
        {% else %}
            {% set chamber_sensor = "" %}
        {% endif %}
        {% if chamber_sensor != "" %}
            M117 Waiting for chamber ({chamber_target}C)...
            TEMPERATURE_WAIT SENSOR="{chamber_sensor}" MINIMUM={chamber_target}
        {% else %}
            RESPOND MSG="Chamber target set but no chamber sensor defined — skipping wait"
        {% endif %}
    {% endif %}

    # Level + mesh — _LEVEL_BED defined in printer-specific macros.cfg
    _LEVEL_BED
    SMART_MESH

    HEALTH_CHECK
    M117 Prep complete


#####################################################################
# Print Start / End
#####################################################################

[gcode_macro PRINT_START]
gcode:
    {% set target_bed      = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber  = params.CHAMBER|default(0)|int %}
    {% set x_center = printer.toolhead.axis_maximum.x / 2 %}
    {% set y_center = printer.toolhead.axis_maximum.y / 2 %}

    PREFLIGHT_CHECK

    status_heating
    M117 Starting...

    # Non-blocking preheat — bed and safe nozzle temp simultaneously
    M140 S{target_bed}
    M104 S150

    status_homing
    CG28
    G90

    ZERO_TOUCH_PREP BED={target_bed} CHAMBER={target_chamber}

    # NEVERMORE_AUTO defined per-printer (fan count/names differ)
    NEVERMORE_AUTO

    # Bed fans — V2.4 only (Feday rear mount). Silently skipped on Trident.
    # BED_FANS_AUTO defined in V2.4 macros.cfg alongside NEVERMORE_AUTO.
    {% if printer['fan_generic bed_fans'] is defined %}
        BED_FANS_AUTO
    {% endif %}

    # Final nozzle heat — park center, wait, brief fan blast to clear ooze
    status_heating
    G1 X{x_center} Y{y_center} Z15 F9000
    M109 S{target_extruder}
    M106 S255
    G4 P3000
    M107

    HEALTH_CHECK

    UPDATE_DELAYED_GCODE ID=HEALTH_LOOP DURATION=30

    {% if printer["filament_motion_sensor BTT_Filament_Sensor"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=BTT_Filament_Sensor ENABLE=1
    {% endif %}

    status_printing
    M117 Priming...
    PRIME_LINE
    M117 Printing...


[gcode_macro PRINT_END]
gcode:
    M117 Complete
    {% if printer["filament_motion_sensor BTT_Filament_Sensor"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=BTT_Filament_Sensor ENABLE=0
    {% endif %}
    M400
    G92 E0
    G1 E-2.0 F3600
    G91
    G0 Z1.00 X20.0 Y20.0 F20000
    G1 Z10 F3000
    G90
    G0 X{printer.toolhead.axis_maximum.x - 10} Y{printer.toolhead.axis_maximum.y - 10} F3600
    TURN_OFF_HEATERS
    M107
    BED_MESH_CLEAR

    # Reset session leveling + mesh flags
    _RESET_SESSION_FLAGS

    # Nevermore keeps running during cooldown for VOC filtering
    status_cooling
    {% if printer.extruder.temperature > 80 %}
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=80
    {% endif %}
    NEVERMORE_OFF

    # Bed fans off — V2.4 only, silently skipped on Trident
    {% if printer['fan_generic bed_fans'] is defined %}
        BED_FANS_OFF
    {% endif %}

    status_ready
    M117 Print Finished!
    BACKUP_CFG


#####################################################################
# Filament
#####################################################################

[delayed_gcode DISABLEFILAMENTMOTIONSENSOR]
initial_duration: 1
gcode:
    {% if printer["filament_motion_sensor BTT_Filament_Sensor"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=BTT_Filament_Sensor ENABLE=0
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament — nozzle must be at print temp before calling
gcode:
    SAVE_GCODE_STATE NAME=UNLOADFILAMENT
    M83
    G1 E10 F600
    G1 E-120 F1800
    RESTORE_GCODE_STATE NAME=UNLOADFILAMENT

[gcode_macro LOAD_FILAMENT]
description: Load filament — nozzle must be at print temp before calling
gcode:
    SAVE_GCODE_STATE NAME=LOADFILAMENT
    M83
    G1 E90 F600
    RESTORE_GCODE_STATE NAME=LOADFILAMENT

[gcode_macro HOT_UNLOAD_FILAMENT]
description: Heat to temp then unload
gcode:
    {% set t = params.T|default(240)|int %}
    M104 S{t}
    EXTRUDERFRONT
    M109 S{t}
    UNLOAD_FILAMENT

[gcode_macro HOT_LOAD_FILAMENT]
description: Heat to temp then load
gcode:
    {% set t = params.T|default(240)|int %}
    M104 S{t}
    EXTRUDERFRONT
    M109 S{t}
    LOAD_FILAMENT

[gcode_macro M600]
description: Filament change / runout alias — delegates to mainsail PAUSE with front park
gcode:
    PAUSE X={printer.toolhead.axis_maximum.x/2} Y=5 Z_MIN=50


#####################################################################
# Parking
#####################################################################

[gcode_macro PARKFRONT]
description: Park front center, mid Z
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKFRONT

[gcode_macro PARKFRONTLOW]
description: Park front center, Z20
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKFRONTLOW
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z20 F19500
    RESTORE_GCODE_STATE NAME=PARKFRONTLOW

[gcode_macro PARKCENTERLOW]
description: Park center, Z50
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKCENTERLOW
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z50 F19500
    RESTORE_GCODE_STATE NAME=PARKCENTERLOW

[gcode_macro PARKREAR]
description: Park top rear left
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKREAR
    G90
    G0 X{printer.toolhead.axis_minimum.x+10} Y{printer.toolhead.axis_maximum.y-10} Z{printer.toolhead.axis_maximum.z-50} F19500
    RESTORE_GCODE_STATE NAME=PARKREAR

[gcode_macro PARKCENTER]
description: Park center of build volume
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKCENTER
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKCENTER

[gcode_macro PARKBED]
description: Park 15mm above center of bed
gcode:
    CG28
    SAVE_GCODE_STATE NAME=PARKBED
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z15 F19500
    RESTORE_GCODE_STATE NAME=PARKBED

[gcode_macro EXTRUDERFRONT]
description: Park extruder at front for filament change
gcode:
    CG28
    SAVE_GCODE_STATE NAME=EXTRUDERFRONT
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F19500
    RESTORE_GCODE_STATE NAME=EXTRUDERFRONT


#####################################################################
# Miscellaneous
#####################################################################

[gcode_macro PRIME_LINE]
description: Prime line along left edge of bed
gcode:
    G92 E0
    G1 X5 Y20 Z0.3 F18000
    G1 E+15 F150
    G92 E0
    G1 X2.2 Y200 Z0.25 F1500 E10
    G1 Z2.0 F3000
    G92 E0

[gcode_macro G32]
description: Full home + bed level (uses printer-specific _LEVEL_BED)
gcode:
    BED_MESH_CLEAR
    M117 Homing
    G28
    M117 Leveling
    _LEVEL_BED
    G28 Z

[gcode_macro RESET_EXTRUDER]
description: Reset extruder position
gcode:
    G92 E0


#####################################################################
# Utility
#####################################################################

[gcode_macro DEBUG_TEMP]
description: Log current temps to console
gcode:
    M105
    {% if printer["temperature_sensor EBBCan"] is defined %}
        RESPOND MSG="EBB Temp: {printer['temperature_sensor EBBCan'].temperature}C"
    {% else %}
        RESPOND MSG="EBB Temp: sensor unavailable"
    {% endif %}


#####################################################################
# Spoolman
#####################################################################

[gcode_macro SET_ACTIVE_SPOOL]
description: Set active Spoolman spool
gcode:
    {% if params.ID %}
        {% set id = params.ID|int %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {% else %}
        {action_respond_info("Parameter 'ID' is required")}
    {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
description: Clear active Spoolman spool
gcode:
    {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}