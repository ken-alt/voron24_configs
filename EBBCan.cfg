# VORON 2.4 350mm — EBBCan Toolhead Board
# Firmware: STM32G0B1, 8 MHz crystal, CAN bus on PB0/PB1
# Extruder config lives in extruder.cfg — swap that file when changing toolhead boards.


[mcu EBBCan]
canbus_uuid: 9f4710a71f4e


[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z


[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20    # center of 350mm bed
