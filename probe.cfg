# VORON 2.4 350mm — SKR 1.4 / EBBCan


#####################################################################
# Probe
#####################################################################

[probe]
pin: ^EBBCan:PB5
x_offset: 0
y_offset: 0
# Active z_offset stored in SAVE_CONFIG
speed: 5
lift_speed: 10
samples: 3
samples_result: median
sample_retract_dist: 3.0
# 0.0075 is the Voron-recommended tolerance for TAP. 0.005 (5 microns)
# is too tight — normal probe variance in a hot enclosure with any nozzle
# residue will exceed it. Raised from 0.005 on 2026-05-26.
samples_tolerance: 0.0075
samples_tolerance_retries: 3
activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    # If actively heating above probe temp — bring it down safely
    {% if printer.extruder.target > PROBE_TEMP %}
        M109 S{PROBE_TEMP}
    # If just hot with no active target — ensure heater is off before
    # waiting for passive cooldown. Without M104 S0, residual PID activity
    # can hold temp and make the wait much longer than expected.
    {% elif printer.extruder.temperature > MAX_TEMP %}
        M104 S0
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={MAX_TEMP}
    {% endif %}
