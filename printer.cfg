## Voron Design VORON2 350mm SKR 1.4 TMC2209 UART config

##========================== Pin Definitions ========================
## X_STEP_PIN  2.2    Y_STEP_PIN  0.19   Z_STEP_PIN  0.22
## X_DIR_PIN   2.6    Y_DIR_PIN   0.20   Z_DIR_PIN   2.11
## X_ENABLE    2.1    Y_ENABLE    2.8    Z_ENABLE    0.21
## X_STOP      1.29   Y_STOP      1.28   Z_STOP      1.27
## X_UART      1.10   Y_UART      1.9    Z_UART      1.8
## E0_STEP     2.13   E0_DIR      0.11   E0_ENABLE   2.12   E0_UART  1.4
## HE1  2.4   HE0  2.7   BED  2.5   TH1  0.23   TH0  0.24   TB  0.25
## FAN  2.3   SERVO  2.0   PROBE  0.10
##===================================================================

# mainsail.cfg first — registers virtual_sdcard, pause_resume, display_status,
# respond, and layer-pause macros before anything that depends on them
[include mainsail.cfg]
[include common_macros.cfg]
[include macros.cfg]
[include EBBCan.cfg]
[include probe.cfg]
[include fans.cfg]
[include filament_runout.cfg]
[include thermistor.cfg]
[include bed_heater.cfg]
[include stealthburner_leds.cfg]
[include led.cfg]
[include config_backup.cfg]


#####################################################################
# Mainsail Client Variables — customizes PAUSE/RESUME/CANCEL_PRINT
#####################################################################

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos:    True
variable_custom_park_x:     175.0
variable_custom_park_y:     5.0
variable_custom_park_dz:    10.0
variable_retract:           1.0
variable_cancel_retract:    5.0
variable_speed_retract:     35.0
variable_unretract:         1.0
variable_speed_unretract:   35.0
variable_speed_hop:         15.0
variable_speed_move:        100.0
variable_park_at_cancel:    True
variable_park_at_cancel_x:  345.0
variable_park_at_cancel_y:  345.0
variable_user_pause_macro:  "_ON_PAUSE"
variable_user_resume_macro: "_ON_RESUME"
variable_user_cancel_macro: "_ON_RESUME"
gcode:




[shaketune]
measurements_chunk_size: 15

[exclude_object]
[gcode_arcs]

[idle_timeout]
timeout: 7200

# Firmware retraction — enable if Orca is configured to use G10/G11.
# If using slicer-controlled retraction, comment this section out
# to avoid double-retracts.
#[firmware_retraction]
#retract_length: 0.5
#retract_speed: 35
#unretract_extra_length: 0
#unretract_speed: 35

[verify_heater extruder]
max_error: 100
check_gain_time: 20
hysteresis: 3
heating_gain: 2


#####################################################################
# MCU
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_1A90000CE3A448AF620C3E5DC32000F5-if00

[mcu z]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_1290FF01809C48AFCD1F3A5DC12000F5-if00

[mcu rpi]
serial: /tmp/klipper_host_mcu


#####################################################################
# Printer
#####################################################################

[printer]
kinematics: corexy
max_velocity: 450
max_accel: 3500
max_z_velocity: 25
max_z_accel: 350
square_corner_velocity: 5.0


#####################################################################
# Input Shaper
#####################################################################

[input_shaper]
shaper_type_x: 3hump_ei
shaper_freq_x: 102.4
damping_ratio_x: 0.045
shaper_type_y: ei
shaper_freq_y: 47.2
damping_ratio_y: 0.054


#####################################################################
# Autotune
#####################################################################

[autotune_tmc stepper_x]
motor: omc-17hs19-2004s1
voltage: 24

[autotune_tmc stepper_y]
motor: omc-17hs19-2004s1
voltage: 24

# Uncomment and verify motor models before enabling Z / extruder autotune
# [autotune_tmc stepper_z]
# motor: omc-17hs19-2004s1
# voltage: 24
# [autotune_tmc stepper_z1]
# motor: omc-17hs19-2004s1
# voltage: 24
# [autotune_tmc stepper_z2]
# motor: omc-17hs19-2004s1
# voltage: 24
# [autotune_tmc stepper_z3]
# motor: omc-17hs19-2004s1
# voltage: 24
# [autotune_tmc extruder]
# motor: ldo-36sth20-1004ahg


#####################################################################
# Bed Mesh
#####################################################################

[bed_mesh]
mesh_min: 40, 40
mesh_max: 310, 310
speed: 300
horizontal_move_z: 10
probe_count: 7, 7
adaptive_margin: 5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
move_check_distance: 3
split_delta_z: 0.0125
mesh_pps: 4, 4
bicubic_tension: 0.2


#####################################################################
# X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
rotation_distance: 40
microsteps: 16
endstop_pin: EBBCan: PB6
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 35
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: P1.10
interpolate: True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
rotation_distance: 40
microsteps: 16
endstop_pin: P1.28
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 35
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: P1.9
interpolate: True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# Z Stepper Settings
#####################################################################

# Z0 - Front Left
[stepper_z]
step_pin: z:P2.2
dir_pin: !z:P2.6
enable_pin: !z:P2.1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 325
position_min: -5
homing_speed: 15.0
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: z:P1.10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# Z1 - Rear Left
[stepper_z1]
step_pin: z:P0.19
dir_pin: z:P0.20
enable_pin: !z:P2.8
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: z:P1.9
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# Z2 - Rear Right
[stepper_z2]
step_pin: z:P0.22
dir_pin: !z:P2.11
enable_pin: !z:P0.21
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: z:P1.8
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# Z3 - Front Right
[stepper_z3]
step_pin: z:P2.13
dir_pin: z:P0.11
enable_pin: !z:P2.12
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: z:P1.4
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# Homing and Gantry Adjustment
#####################################################################

[homing_override]
axes: z
set_position_z: 0
gcode:
    G90                         # explicit absolute positioning — safe regardless of prior state
    status_homing
    G0 Z5 F600
    G28 X Y
    G0 X175 Y175 F18000     # fast XY center move before Z home
    G28 Z
    G0 Z30 F3000              # lift Z first
    G0 X175 Y175 F18000       # then fast XY park
    status_ready

[quad_gantry_level]
gantry_corners:
    -60,-10
    410,420
points:
    50,25
    50,275
    300,275
    300,25
speed: 250
horizontal_move_z: 10
retries: 6
retry_tolerance: 0.0075
max_adjust: 10

